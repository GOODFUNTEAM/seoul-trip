<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>孤芳小隊海外大冒險 — 搜ㄦ篇</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇰🇷</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;700;900&family=DM+Mono:wght@400;500&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,900;1,600&display=swap');

/* ═══════════════════════════════════════
   VARIABLES
═══════════════════════════════════════ */
:root {
  --ink:     #111010;
  --white:   #FAFAF8;
  --yellow:  #FFE600;
  --orange:  #FF6B00;
  --red:     #E8001C;
  --muted:   #777470;
  --border:  #111010;
  --rule:    1.5px solid #111010;

  --font-display: 'Bebas Neue', sans-serif;
  --font-cond:    'Barlow Condensed', sans-serif;
  --font-body:    'Noto Sans KR', sans-serif;
  --font-mono:    'DM Mono', monospace;

  --radius: 0px;
  --transition: 0.18s ease;
}

/* ═══════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--white);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  overflow-x: hidden;
}

a { color: inherit; text-decoration: none; }
button { cursor: pointer; border: none; background: none; font-family: inherit; }
img { display: block; max-width: 100%; }

/* ═══════════════════════════════════════
   HEADER / NAV
═══════════════════════════════════════ */
.site-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--white);
  border-bottom: var(--rule);
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  height: 52px;
  border-bottom: var(--rule);
}

.site-logo {
  font-family: var(--font-display);
  font-size: 22px;
  letter-spacing: 0.04em;
  line-height: 1;
}
.site-logo span { color: var(--orange); }

.header-meta {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.15em;
  color: var(--muted);
  text-transform: uppercase;
}

/* Weather Widget */
.weather-widget {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 4px 10px;
  border: var(--rule);
  background: var(--yellow);
}
.weather-widget .temp { font-size: 15px; font-weight: 500; }

/* Day Nav */
.day-nav {
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
}
.day-nav::-webkit-scrollbar { display: none; }

.day-tab {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px 20px 8px;
  border-right: var(--rule);
  cursor: pointer;
  transition: background var(--transition);
  gap: 2px;
  min-width: 80px;
}
.day-tab:hover { background: var(--yellow); }
.day-tab.active { background: var(--yellow); }

.day-tab-label {
  font-family: var(--font-display);
  font-size: 22px;
  line-height: 1;
}
.day-tab-date {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  color: var(--muted);
}
.day-tab-theme {
  font-family: var(--font-cond);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
}

.tab-home {
  min-width: 60px;
  border-right: var(--rule);
}

/* ═══════════════════════════════════════
   HERO
═══════════════════════════════════════ */
.hero {
  display: grid;
  grid-template-columns: 1fr 1fr;
  border-bottom: var(--rule);
  min-height: 280px;
}

.hero-left {
  padding: 40px 32px;
  border-right: var(--rule);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.hero-eyebrow {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}

.hero-title {
  font-family: var(--font-display);
  font-size: clamp(52px, 8vw, 88px);
  line-height: 0.9;
  letter-spacing: 0.01em;
}
.hero-title em {
  font-style: normal;
  color: var(--orange);
  display: block;
}

.hero-sub {
  font-family: var(--font-cond);
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 12px;
}

.hero-right {
  background: var(--yellow);
  padding: 32px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  position: relative;
  overflow: hidden;
}

.hero-right::before {
  content: 'SEOUL';
  position: absolute;
  bottom: -20px;
  right: -10px;
  font-family: var(--font-display);
  font-size: 120px;
  color: rgba(0,0,0,0.06);
  line-height: 1;
  pointer-events: none;
}

.hero-info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.hero-info-item {}
.hero-info-label {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(0,0,0,0.45);
  margin-bottom: 3px;
}
.hero-info-value {
  font-family: var(--font-cond);
  font-size: 16px;
  font-weight: 700;
  text-transform: uppercase;
}

.tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 16px; }
.tag {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 3px 8px;
  border: 1.5px solid var(--ink);
  background: white;
}

/* ═══════════════════════════════════════
   VIEWS
═══════════════════════════════════════ */
.view { display: none; }
.view.active { display: block; }

/* ═══════════════════════════════════════
   OVERVIEW (Home)
═══════════════════════════════════════ */
.overview-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  border-bottom: var(--rule);
}

.overview-card {
  padding: 20px 16px;
  border-right: var(--rule);
  cursor: pointer;
  transition: background var(--transition);
  position: relative;
}
.overview-card:last-child { border-right: none; }
.overview-card:hover { background: #F5F5F0; }

.overview-card-day {
  font-family: var(--font-display);
  font-size: 44px;
  line-height: 0.9;
  margin-bottom: 4px;
}
.overview-card-date {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.15em;
  color: var(--muted);
  margin-bottom: 6px;
}
.overview-card-theme {
  font-family: var(--font-cond);
  font-size: 14px;
  font-weight: 700;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.overview-card-desc {
  font-size: 11px;
  color: var(--muted);
  line-height: 1.6;
}
.overview-card-count {
  position: absolute;
  bottom: 14px;
  right: 14px;
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 0.1em;
}

.overview-card.highlight-day {
  background: var(--yellow);
}
.overview-card.highlight-day:hover {
  background: #FFD900;
}

/* ═══════════════════════════════════════
   SECTION HEADER
═══════════════════════════════════════ */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: var(--rule);
}

.section-title {
  font-family: var(--font-display);
  font-size: 32px;
  letter-spacing: 0.02em;
}
.section-title span { color: var(--orange); }

.section-meta {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
}

/* ═══════════════════════════════════════
   SPOT CARDS
═══════════════════════════════════════ */
.spots-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  border-top: var(--rule);
}

.spot-card {
  border-right: var(--rule);
  border-bottom: var(--rule);
  padding: 16px;
  position: relative;
  transition: background var(--transition);
}
.spot-card:hover { background: #F9F9F6; }
.spot-card.checked { background: #F0F0EC; }
.spot-card.checked .spot-name { text-decoration: line-through; color: var(--muted); }

.spot-card.highlight {
  background: var(--yellow);
}
.spot-card.highlight:hover { background: #FFD900; }
.spot-card.highlight.checked { background: #E8E0A0; }

.spot-header {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 8px;
}

.spot-emoji {
  font-size: 20px;
  flex-shrink: 0;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.spot-name {
  font-family: var(--font-cond);
  font-size: 16px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.02em;
  line-height: 1.2;
}
.spot-name-kr {
  font-family: var(--font-body);
  font-size: 11px;
  color: var(--muted);
  font-weight: 400;
  margin-top: 1px;
}

.spot-desc {
  font-size: 12px;
  line-height: 1.6;
  color: #444;
  margin-bottom: 10px;
}

.spot-status {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  margin-bottom: 6px;
}
.spot-status .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #ccc;
}
.spot-status.open .dot  { background: #22C55E; }
.spot-status.closed .dot { background: #EF4444; }

.spot-hours {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
  margin-bottom: 10px;
}

.spot-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 10px;
}
.spot-tag {
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 2px 6px;
  border: 1px solid rgba(0,0,0,0.2);
  color: var(--muted);
}

.spot-actions {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 5px 10px;
  border: 1.5px solid var(--ink);
  background: white;
  cursor: pointer;
  transition: all var(--transition);
}
.btn:hover { background: var(--ink); color: white; }

.btn-check {
  background: var(--ink);
  color: white;
}
.btn-check:hover { background: #333; }
.spot-card.checked .btn-check { background: #888; }
.spot-card.checked .btn-check:hover { background: var(--red); }

.btn-map-g { border-color: #4285F4; color: #4285F4; }
.btn-map-g:hover { background: #4285F4; color: white; }
.btn-map-k { border-color: #FFCD00; color: #333; background: #FFCD00; }
.btn-map-k:hover { background: #E5B800; border-color: #E5B800; }

/* ═══════════════════════════════════════
   MAP MODAL
═══════════════════════════════════════ */
.map-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 500;
  display: none;
  align-items: center;
  justify-content: center;
}
.map-modal-overlay.open { display: flex; }

.map-modal {
  background: white;
  border: var(--rule);
  padding: 28px;
  min-width: 320px;
  max-width: 420px;
  width: 90%;
  box-shadow: 8px 8px 0 var(--ink);
}

.map-modal-title {
  font-family: var(--font-display);
  font-size: 24px;
  margin-bottom: 4px;
}
.map-modal-kr {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 20px;
}

.map-btn-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}

.map-big-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 18px 12px;
  border: var(--rule);
  cursor: pointer;
  transition: all var(--transition);
  font-family: var(--font-cond);
  font-weight: 700;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.map-big-btn svg { width: 24px; height: 24px; }
.map-big-btn.google:hover { background: #4285F4; color: white; }
.map-big-btn.kakao { background: var(--yellow); }
.map-big-btn.kakao:hover { background: #FFD900; }

.map-modal-close {
  width: 100%;
  padding: 10px;
  border: var(--rule);
  background: white;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
}
.map-modal-close:hover { background: #F0F0EC; }

/* ═══════════════════════════════════════
   PHRASES PAGE
═══════════════════════════════════════ */
.phrases-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  border-top: var(--rule);
}

.phrase-card {
  border-right: var(--rule);
  border-bottom: var(--rule);
  cursor: pointer;
  perspective: 600px;
  height: 130px;
}

.phrase-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

.phrase-card.flipped .phrase-inner {
  transform: rotateY(180deg);
}

.phrase-front, .phrase-back {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 16px;
  text-align: center;
}

.phrase-front { background: white; }
.phrase-back  { background: var(--yellow); transform: rotateY(180deg); }

.phrase-zh-text {
  font-family: var(--font-cond);
  font-size: 18px;
  font-weight: 700;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.phrase-hint {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  color: var(--muted);
  text-transform: uppercase;
}

.phrase-kr-text {
  font-family: var(--font-body);
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 6px;
}
.phrase-roman-text {
  font-family: var(--font-mono);
  font-size: 11px;
  color: #555;
  font-style: italic;
}

/* ═══════════════════════════════════════
   TRANSPORT PAGE
═══════════════════════════════════════ */
.transport-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  border-top: var(--rule);
}

.transport-block {
  padding: 24px 20px;
  border-right: var(--rule);
  border-bottom: var(--rule);
}
.transport-block:nth-child(even) { border-right: none; }

.transport-block-title {
  font-family: var(--font-display);
  font-size: 26px;
  margin-bottom: 4px;
}
.transport-block-sub {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
}

.flight-card {
  border: var(--rule);
  padding: 14px;
  background: var(--yellow);
  margin-bottom: 10px;
}
.flight-number {
  font-family: var(--font-display);
  font-size: 28px;
  margin-bottom: 4px;
}
.flight-route {
  font-family: var(--font-cond);
  font-size: 15px;
  font-weight: 700;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}
.flight-time {
  font-family: var(--font-mono);
  font-size: 11px;
  color: #555;
}

.card-info {
  border: var(--rule);
  padding: 14px;
  margin-bottom: 10px;
}
.card-info-title {
  font-family: var(--font-cond);
  font-size: 16px;
  font-weight: 700;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.card-info-price {
  font-family: var(--font-display);
  font-size: 28px;
  color: var(--orange);
  margin-bottom: 6px;
}
.card-info-note {
  font-size: 11px;
  color: var(--muted);
  line-height: 1.6;
}

.warning-box {
  border: 2px solid var(--red);
  padding: 10px 12px;
  background: rgba(232,0,28,0.05);
}
.warning-box p {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--red);
  line-height: 1.7;
}

.metro-list { display: flex; flex-direction: column; gap: 6px; }
.metro-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border: var(--rule);
}
.metro-badge {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 500;
  padding: 2px 6px;
  color: white;
  flex-shrink: 0;
  min-width: 60px;
  text-align: center;
}
.metro-spots {
  font-size: 11px;
  color: var(--muted);
}

/* ═══════════════════════════════════════
   PROGRESS BAR
═══════════════════════════════════════ */
.progress-bar-section {
  padding: 12px 20px;
  border-bottom: var(--rule);
  display: flex;
  align-items: center;
  gap: 12px;
}
.progress-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  flex-shrink: 0;
}
.progress-track {
  flex: 1;
  height: 6px;
  background: #E5E5E0;
  border: 1px solid var(--ink);
  position: relative;
}
.progress-fill {
  height: 100%;
  background: var(--yellow);
  transition: width 0.4s ease;
}
.progress-count {
  font-family: var(--font-display);
  font-size: 16px;
  flex-shrink: 0;
}

/* ═══════════════════════════════════════
   FOOTER
═══════════════════════════════════════ */
.site-footer {
  border-top: var(--rule);
  padding: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 40px;
}
.footer-logo {
  font-family: var(--font-display);
  font-size: 20px;
}
.footer-logo span { color: var(--orange); }
.footer-meta {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.15em;
  color: var(--muted);
  text-align: right;
  line-height: 1.8;
}

/* ═══════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════ */
@media (max-width: 768px) {
  .hero { grid-template-columns: 1fr; }
  .hero-left { padding: 24px 16px; }
  .hero-right { padding: 20px 16px; min-height: 200px; }
  .overview-grid { grid-template-columns: repeat(3, 1fr); }
  .transport-grid { grid-template-columns: 1fr; }
  .transport-block { border-right: none; }
  .header-top { padding: 0 12px; }
  .spots-list { grid-template-columns: 1fr; }
  .phrases-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 480px) {
  .overview-grid { grid-template-columns: 1fr 1fr; }
  .hero-title { font-size: 48px; }
  .day-tab { min-width: 64px; padding: 8px 10px 6px; }
}

/* ═══════════════════════════════════════
   ANIMATIONS
═══════════════════════════════════════ */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.view.active { animation: fadeIn 0.22s ease; }

.spot-card {
  animation: fadeIn 0.2s ease both;
}

/* stagger */
.spot-card:nth-child(1)  { animation-delay: 0.02s; }
.spot-card:nth-child(2)  { animation-delay: 0.04s; }
.spot-card:nth-child(3)  { animation-delay: 0.06s; }
.spot-card:nth-child(4)  { animation-delay: 0.08s; }
.spot-card:nth-child(5)  { animation-delay: 0.10s; }
.spot-card:nth-child(6)  { animation-delay: 0.12s; }
.spot-card:nth-child(7)  { animation-delay: 0.14s; }
.spot-card:nth-child(8)  { animation-delay: 0.16s; }
.spot-card:nth-child(9)  { animation-delay: 0.18s; }
.spot-card:nth-child(10) { animation-delay: 0.20s; }

    if (!card) return;

    const isChecked = !!checkedSpots[spotId];
    card.classList.toggle('checked', isChecked);
    const btn = card.querySelector('.btn-check');
    if (btn) btn.textContent = isChecked ? '✓ 已打卡' : '打卡';

    updateProgress();
  }

  function updateProgress() {
    const total = getTotalSpots();
    const checked = Object.keys(checkedSpots).length;
    const pct = total > 0 ? (checked / total * 100) : 0;

    const heroP = document.getElementById('hero-progress');
    if (heroP) heroP.textContent = `${checked} / ${total}`;

    const globalFill = document.getElementById('global-progress-fill');
    const globalCount = document.getElementById('global-progress-count');
    if (globalFill) globalFill.style.width = pct + '%';
    if (globalCount) globalCount.textContent = `${checked} / ${total}`;

    TRIP_DATA.days.forEach(day => {
      const dayChecked = day.spots.filter(s => checkedSpots[s.id]).length;
      const dayPct = day.spots.length > 0 ? (dayChecked / day.spots.length * 100) : 0;
      const fill = document.getElementById(`progress-fill-${day.id}`);
      const count = document.getElementById(`progress-count-${day.id}`);
      if (fill) fill.style.width = dayPct + '%';
      if (count) count.textContent = `${dayChecked} / ${day.spots.length}`;
    });
  }

  // ── MAP MODAL ─────────────────────────
  function openMapModal(spotId) {
    const spot = findSpot(spotId);
    if (!spot) return;
    pendingMapSpot = spot;

    document.getElementById('modal-spot-name').textContent = spot.name;
    document.getElementById('modal-spot-kr').textContent = spot.nameKr;

    const gmUrl = `https://www.google.com/maps?q=${spot.lat},${spot.lng}`;
    const kmUrl = `https://map.kakao.com/link/map/${encodeURIComponent(spot.nameKr)},${spot.lat},${spot.lng}`;

    document.getElementById('btn-google-map').onclick = () => window.open(gmUrl, '_blank');
    document.getElementById('btn-kakao-map').onclick  = () => window.open(kmUrl, '_blank');

    document.getElementById('map-modal-overlay').classList.add('open');
  }

  function closeMapModal(e) {
    if (!e || e.target === document.getElementById('map-modal-overlay') || !e.target.closest('.map-modal')) {
      document.getElementById('map-modal-overlay').classList.remove('open');
      pendingMapSpot = null;
    }
  }

  // ── PHRASE FLIP ───────────────────────
  function flipPhrase(i) {
    const card = document.getElementById(`phrase-${i}`);
    if (card) card.classList.toggle('flipped');
  }

  // ── WEATHER ───────────────────────────
  async function fetchWeather() {
    try {
      // Open-Meteo — 首爾座標，不需要API Key
      const url = 'https://api.open-meteo.com/v1/forecast?latitude=37.5665&longitude=126.9780&current=temperature_2m,weathercode,apparent_temperature&timezone=Asia%2FSeoul';
      const res = await fetch(url);
      const data = await res.json();
      const c = data.current;

      const temp = Math.round(c.temperature_2m);
      const feel = Math.round(c.apparent_temperature);
      const desc = getWeatherDesc(c.weathercode);
      const icon = getWeatherIcon(c.weathercode);

      document.getElementById('temp').textContent = `${temp}°C`;
      document.getElementById('weather-desc').textContent = `${icon} ${desc} · 體感 ${feel}°C`;
    } catch(e) {
      document.getElementById('weather-desc').textContent = '首爾天氣';
    }
  }

  function getWeatherDesc(code) {
    if (code === 0) return '晴天';
    if (code <= 2) return '多雲';
    if (code === 3) return '陰天';
    if (code <= 49) return '霧';
    if (code <= 67) return '下雨';
    if (code <= 77) return '下雪';
    if (code <= 82) return '陣雨';
    return '雷雨';
  }

  function getWeatherIcon(code) {
    if (code === 0) return '☀️';
    if (code <= 2) return '⛅';
    if (code === 3) return '☁️';
    if (code <= 49) return '🌫️';
    if (code <= 67) return '🌧️';
    if (code <= 77) return '❄️';
    if (code <= 82) return '🌦️';
    return '⛈️';
  }

  // ── STATUS ────────────────────────────
  function getStatusInfo(spot) {
    if (spot.category === 'area' || spot.category === 'transport') {
      return { cls: '', label: spot.hours };
    }

    const now = new Date();
    const koreaTime = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Seoul' }));
    const h = koreaTime.getHours();
    const m = koreaTime.getMinutes();
    const current = h * 60 + m;

    const parseTime = (str) => {
      const match = str.match(/(\d+):(\d+)/);
      return match ? parseInt(match[1]) * 60 + parseInt(match[2]) : null;
    };

    const parts = spot.hours.split('–');
    if (parts.length < 2) return { cls: '', label: spot.hours };

    const open = parseTime(parts[0]);
    const close = parseTime(parts[1]);
    if (!open || !close) return { cls: '', label: spot.hours };

    if (current >= open && current < close) {
      return { cls: 'open', label: `營業中 · 到 ${parts[1]}` };
    } else {
      return { cls: 'closed', label: `已關閉 · 開門 ${parts[0]}` };
    }
  }

  // ── HELPERS ───────────────────────────
  function getTotalSpots() {
    return TRIP_DATA.days.reduce((acc, d) => acc + d.spots.length, 0);
  }

  function findSpot(spotId) {
    for (const day of TRIP_DATA.days) {
      const s = day.spots.find(sp => sp.id === spotId);
      if (s) return s;
    }
    return null;
  }

  // ── PUBLIC ────────────────────────────
  return { init, switchView, toggleCheck, openMapModal, closeMapModal, flipPhrase };

})();

document.addEventListener('DOMContentLoaded', App.init);
  </script>
</body>
</html>
